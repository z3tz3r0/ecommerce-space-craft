version: "2"
sql:
  - engine: postgresql
    queries: internal/catalog/queries.sql
    schema: migrations
    gen:
      go:
        package: catalogdb
        out: internal/catalog/db
        sql_package: pgx/v5
        emit_pointers_for_null_types: true
        emit_json_tags: false
        emit_prepared_queries: false
        overrides:
          # Use google/uuid directly instead of pgtype.UUID so the domain types
          # and the sqlc row types share the same UUID representation.
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          # timestamptz → time.Time (non-null columns only — they have NOT NULL).
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
