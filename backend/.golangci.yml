version: "2"

run:
  timeout: 3m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - unconvert
    - bodyclose
    - errorlint
  exclusions:
    paths:
      - "internal/catalog/db/db.go"
      - "internal/catalog/db/models.go"
      - "internal/catalog/db/queries.sql.go"
    rules:
      - path: "_test\\.go$"
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
