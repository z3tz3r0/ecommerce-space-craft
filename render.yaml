services:
  - type: web
    name: spacecraft-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    branch: main
    healthCheckPath: /health
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false  # set manually in dashboard — Neon connection string
      - key: CORS_ORIGINS
        value: http://localhost:5173,https://ecommerce-space-craft.vercel.app
      - key: LOG_LEVEL
        value: info
      - key: ENVIRONMENT
        # Either "prod" or "production" works (config.parseEnvironment
        # normalises both), but "production" matches the canonical literal
        # the Go code compares against — keeps the blueprint reading as
        # intent without depending on the normaliser.
        value: production
